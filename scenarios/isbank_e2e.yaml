# İşbank E2E test — Turkish bank agent with Turkish customer
name: isbank_e2e
language: tr
description: "Full E2E test with İşbank Turkish prompt, customer asking about ek hesap"

agent_overrides:
  instructions_file: prompts/isbank_turkish.txt
  greeting: "İyi günler, ben Türkiye İş Bankası dijital asistanıyım. Size nasıl yardımcı olabilirim?"
  config:
    stt:
      provider: speechmatics
      language: tr
      languageHintsStrict: false
      ensembleEnabled: false
    llm:
      model: gpt-4.1

tester:
  voice: a0e99841-438c-4a64-b679-ae501e7d6091
  wait_after_greeting_sec: 4
  instructions: |
    Sen Türkiye İş Bankası'nı arayan bir müşteri olan Ahmet'sin.
    Ek hesap teklifi hakkında bilgi almak istiyorsun.

    Konuşma akışı:
    1. Agent seni selamladığında, adını söyle ve ek hesap teklifi hakkında bilgi iste
    2. Limit hakkında sor
    3. Faiz oranını sor
    4. İşlem ücreti olup olmadığını sor
    5. Teşekkür et ve düşüneceğini söyle

    Kısa ve doğal konuş. Gerçek bir telefon görüşmesi gibi.
    Türkçe konuş.

prompts:
  - text: "Merhaba, benim adim Ahmet. Ek hesap teklifi hakkinda bilgi almak istiyorum."
    pause_after_sec: 5
    wait_for_response: true
  - text: "Limit ne kadar?"
    pause_after_sec: 5
    wait_for_response: true
  - text: "Faiz orani nedir?"
    pause_after_sec: 5
    wait_for_response: true
  - text: "Islem ucreti var mi?"
    pause_after_sec: 5
    wait_for_response: true
  - text: "Tamam, tesekkur ederim. Dusunecegim."
    pause_after_sec: 3
    wait_for_response: true
