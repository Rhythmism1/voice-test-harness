# Test: verbose system prompt (baseline comparison for prompt_concise)
name: prompt_verbose
language: en
description: "Default verbose prompt — compare TTFT and response length against concise variant"

# No agent_overrides — uses the default system prompt from test_agent_config.json

tester:
  voice: a0e99841-438c-4a64-b679-ae501e7d6091

prompts:
  - text: "What's your baggage policy for international flights?"
    pause_after_sec: 3.0
    wait_for_response: true

  - text: "Can I bring a guitar as carry-on?"
    pause_after_sec: 3.0
    wait_for_response: true

  - text: "What about oversized luggage fees?"
    pause_after_sec: 3.0
    wait_for_response: true

  - text: "How do I change my seat assignment?"
    pause_after_sec: 3.0
    wait_for_response: true

  - text: "Thanks, that's all I needed."
    pause_after_sec: 2.0
    wait_for_response: true

thresholds:
  max_avg_llm_ttft_ms: 1500
